<!doctype html>
<html>
  <head>
    <title>Recipe - Recipe Database</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="index.html">
          <h1>Recipe Database</h1>
        </a>
        <div class="nav-icon">
          <a href="https://facebook.com">
            <i class="fa-brands fa-facebook"></i>
          </a>
          <a href="https://instagram.com">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://github.com">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>
      </nav>
      <nav>
        <div class="nav-links">
          <a href="starters.html"><h3>Starters</h3></a>
          <a href="main-courses.html"><h3>Main Courses</h3> </a>
          <a href="desserts.html"><h3>Desserts</h3></a>
        </div>
      </nav>
    </header>

    <main>
      <div class="recipe-hero">
        <img id="meal-image" src="" alt="" />
        <div class="hero-text">
          <h2 id="meal-name"></h2>
          <div class="recipe-icons">
            <span id="meal-area"
              ><i class="fa-regular fa-earth-americas"></i
            ></span>
            <span id="meal-category"><i class="fa-regular fa-tag"></i></span>
            <span
              class="save-btn"
              onclick="
                this.querySelector('i').classList.toggle('fa-solid');
                this.querySelector('i').classList.toggle('fa-regular');
              "
              ><i class="fa-regular fa-heart"></i>Save Recipe</span
            >
          </div>
        </div>
      </div>
      <section class="recipe-info">
        <div class="recipe-ingredients">
          <h3>Ingredients</h3>
          <ul id="meal-ingredients"></ul>
        </div>
        <div class="recipe-instructions">
          <h3>Instructions</h3>
          <ol id="meal-instructions"></ol>
        </div>
      </section>
    </main>

    <footer>
      <div class="contact-us">
        <h3>Contact Us</h3>
        <p>Developed by Ekaterina, Sali, Desirée and Leo</p>
      </div>
      <div class="info">
        <h3>Information</h3>
        <ul>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Privacy Policy</a></li>
          <li><a href="#">Terms of Service</a></li>
          <li><a href="#">Cookie Policy</a></li>
          <li><a href="#">More Info</a></li>
        </ul>
      </div>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/recipe.js"></script>
  </body>
</html>
