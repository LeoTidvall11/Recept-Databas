<!doctype html>
<html>

<head>
    <title>Recept-Databas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Recept-Databas</h1>
            <div class="nav-icon">
                <a href="https://facebook.com">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://instagram.com">
                    <i class=" fa-brands fa-instagram"></i>
                </a>
                <a href="https://github.com">
                    <i class=" fa-brands fa-github"></i>
                </a>
            </div>
            </div>
        </nav>
        <nav>
            <div class="nav-links">
                <a href="#">Förrätter</a>
                <a href="#">Huvudrätter</a>
                <a href="#">Efterrätter</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>
                    Sök efter recept
                </h2>
                <div class="search-container">
                    <input type="text" placeholder="Sök efter recept..." id="search-input">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="search-icon">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </div>
            </div>
        </section>
        <section class="recipe-card">
            <div>
                <h2>Favorit recept</h2>
                <article>
                    <img src="/assets/Recept-bild (Liten).jpg" alt="Recept på pizza">
                </article>
                <article><img src="/assets/Recept-bild-2 (Liten).jpg" alt="Recept 2"></article>
                <article><img src="/assets/Recept-bild-3 (Liten).jpg" alt="Recept 3"></article>
            </div>
        </section>
    </main>

    <footer>
        <p>
            Developed by Sali, Desiree och Leo
        </p>
    </footer>
</body>

</html>
